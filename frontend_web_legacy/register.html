<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - DevCore</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <a href="index.html" class="back-btn">←</a>
            <h1>Crear Cuenta</h1>
            <p>Únete a la comunidad UAT</p>
        </div>

        <!-- Form -->
        <div class="form-container">
            <div class="alert alert-info">
                <strong>📋 Validación Institucional</strong><br>
                Tu cuenta será validada por el personal administrativo en menos de 24 horas.
            </div>

            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" placeholder="Ingresa tu nombre completo" required>
                </div>

                <div class="form-group">
                    <label for="matricula">Matrícula</label>
                    <input type="text" id="matricula" placeholder="Ej: 2021370001" required>
                </div>

                <div class="form-group">
                    <label for="email">Correo Institucional (@uat.edu.mx)</label>
                    <input type="email" id="email" placeholder="ejemplo@uat.edu.mx" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Mínimo 8 caracteres" required>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirmar Contraseña</label>
                    <input type="password" id="confirm-password" placeholder="Repite tu contraseña" required>
                </div>

                <div class="form-group">
                    <label>Ficha de Pago (Obligatorio) 📄</label>
                    <label for="ficha" class="file-upload">
                        <div class="file-upload-icon">📤</div>
                        <p style="color: #6C757D; font-size: 14px; margin: 0;">
                            <strong>Clic para subir tu ficha de pago</strong><br>
                            PDF o imagen (max 5MB)
                        </p>
                        <input type="file" id="ficha" accept=".pdf,.jpg,.png" required>
                    </label>
                </div>

                <div style="margin: 20px 0;">
                    <label style="display: flex; align-items: center; gap: 10px; font-size: 14px; color: #6C757D;">
                        <input type="checkbox" required>
                        <span>Acepto los <a href="#" style="color: #FFB39C;">términos y condiciones</a></span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary" style="margin-bottom: 15px; width: 100%; border: none; cursor: pointer; text-align: center; font-size: 16px;">Registrarse</button>
                
                <a href="login.html" class="btn btn-outline">Ya tengo cuenta</a>
            </form>
        </div>
    </div>

    <!-- Scripts de Conexión a la API -->
    <script src="js/api.js"></script>
    <script>
        async function handleRegister(e) {
            e.preventDefault();
            const nombre = document.getElementById('nombre').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;
            
            if (password !== confirm) {
                alert("Las contraseñas no coinciden");
                return;
            }
            
            try {
                const res = await fetch(`${API_URL}/usuarios/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, email, password })
                });
                const json = await res.json();
                
                if (res.ok) {
                    alert("Cuenta creada correctamente. ¡Ahora inicia sesión!");
                    window.location.href = 'login.html';
                } else {
                    alert("Error al registrar: " + JSON.stringify(json));
                }
            } catch(error) {
                alert("Error de red conectando al servidor.");
            }
        }
    </script>
</body>
</html>
