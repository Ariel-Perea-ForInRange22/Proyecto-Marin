<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - DevCore</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <a href="index.html" class="back-btn">←</a>
            <h1>Iniciar Sesión</h1>
            <p>Accede a tu cuenta</p>
        </div>

        <!-- Form -->
        <div class="form-container">
            <!-- Logo -->
            <div style="text-align: center; margin-bottom: 30px;">
                <div style="width: 100px; height: 100px; background: linear-gradient(135deg, #8AB4D7 0%, #FFB39C 100%); border-radius: 50%; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 50px;">
                    🎓
                </div>
            </div>

            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Correo Institucional</label>
                    <input type="email" id="email" placeholder="ejemplo@uat.edu.mx" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
                </div>

                <div style="text-align: right; margin-bottom: 20px;">
                    <a href="#" style="color: #FFB39C; font-size: 14px; text-decoration: none;">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn btn-primary" style="margin-bottom: 15px; width: 100%; border: none; cursor: pointer; text-align: center; font-size: 16px;">Entrar</button>
                
                <div style="text-align: center; margin: 20px 0;">
                    <span style="color: #6C757D; font-size: 14px;">o</span>
                </div>

                <a href="register.html" class="btn btn-outline">Crear Cuenta Nueva</a>
            </form>
        </div>
    </div>

    <!-- Scripts de Conexión a la API -->
    <script src="js/api.js"></script>
    <script>
        // Redirigir si ya está logueado
        if (isAuthenticated()) {
            window.location.href = 'home.html';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const formData = new URLSearchParams();
            formData.append("username", email);
            formData.append("password", password);
            
            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                const json = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('devcore_token', json.access_token);
                    
                    // Opcionalmente podemos pedir los datos del usuario aquí para guardarlos globalmente
                    const authRes = await fetch(`${API_URL}/usuarios/me`, {
                        headers: { 'Authorization': `Bearer ${json.access_token}` }
                    });
                    if (authRes.ok) {
                        const userData = await authRes.json();
                        localStorage.setItem('devcore_user', JSON.stringify(userData));
                    }
                    
                    window.location.href = 'home.html';
                } else {
                    alert("Error al iniciar sesión: " + (json.detail || "Datos incorrectos"));
                }
            } catch(error) {
                alert("Error de red conectando al servidor.");
            }
        }
    </script>
</body>
</html>
