<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <style>
        .mod-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 4px solid #E65100;
        }
        .mod-user { font-weight: bold; color: #333; margin-bottom: 5px;}
        .mod-content { color: #555; font-size: 14px; line-height: 1.5; margin-bottom: 15px; }
        .mod-actions { display: flex; gap: 10px; }
        .mod-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; }
        .btn-approve { background-color: #4CAF50; }
        .btn-reject { background-color: #F44336; }
    </style>
</head>
<body>
    <script src="js/api.js"></script>
    <script>
        if (!isAuthenticated()) window.location.href = 'login.html';
        
        try {
            const ud = JSON.parse(localStorage.getItem('devcore_user'));
            if (!ud || !ud.es_staff) {
                alert("Acceso denegado. Solo personal administrativo.");
                window.location.href = 'home.html';
            }
        } catch(e) { window.location.href = 'home.html'; }
    </script>

    <div class="container">
        <!-- Header -->
        <div class="header" style="background: linear-gradient(135deg, #FFB39C 0%, #E65100 100%);">
            <a href="home.html" class="back-btn" style="position: static; margin-bottom: 10px;">←</a>
            <h1>🛡️ Moderación</h1>
            <p>Aprobación de Contenido</p>
        </div>

        <div class="content" id="pendingArea">
            <div style="text-align: center; color: #888; padding: 40px;">Cargando publicaciones pendientes...</div>
        </div>
    </div>

    <script>
        async function loadPending() {
            try {
                // Asumiendo comunidad 1 por defecto
                const res = await fetchAuth(`/comunidades/1/pendientes`);
                if (!res) return;
                const posts = await res.json();
                
                const area = document.getElementById('pendingArea');
                area.innerHTML = '';
                
                if (posts.length === 0) {
                    area.innerHTML = `
                        <div style="text-align: center; padding: 40px;">
                            <div style="font-size: 50px; margin-bottom: 15px;">✨</div>
                            <h3 style="color:#6C757D; margin:0;">Todo limpio</h3>
                            <p style="color:#888;">No hay publicaciones pendientes de revisión.</p>
                        </div>
                    `;
                    return;
                }

                posts.forEach(post => {
                    area.innerHTML += `
                        <div class="mod-card">
                            <div style="color: #E65100; font-size: 11px; font-weight: bold; margin-bottom: 5px;">🔴 PENDIENTE DE REVISIÓN</div>
                            <div class="mod-user">${post.autor.nombre} <span style="font-size:12px; color:#888; font-weight:normal;">(${post.autor.email})</span></div>
                            <div class="mod-content">"${post.contenido}"</div>
                            <div class="mod-actions">
                                <button onclick="changeStatus(${post.id}, 'APROBADA')" class="mod-btn btn-approve">✅ Aprobar</button>
                                <button onclick="changeStatus(${post.id}, 'RECHAZADA')" class="mod-btn btn-reject">❌ Rechazar</button>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                document.getElementById('pendingArea').innerHTML = '<div style="color:red; text-align:center;">Error al cargar.</div>';
            }
        }

        async function changeStatus(pubId, newStatus) {
            try {
                const res = await fetchAuth(`/comunidades/1/publicaciones/${pubId}/estado`, {
                    method: 'PATCH',
                    body: JSON.stringify({ estado: newStatus })
                });
                
                if (res && res.ok) {
                    loadPending();
                } else {
                    alert("No se pudo actualizar el estado.");
                }
            } catch (err) {
                alert("Error de red.");
            }
        }

        loadPending();
    </script>
</body>
</html>
